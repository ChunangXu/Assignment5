<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Event Management MVC Demo</title>
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css"
		/>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="index.css" />
		<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
		<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/default.js"></script>
		<script src="script.js" defer></script>
	</head>
	<body>
		<main class="page-shell">
			<header class="page-header">
				<h1>Community Event Management</h1>
				<p>MVC pattern demo with authentication and persistent storage.</p>
			</header>

			<section id="auth-section" class="card auth-card" aria-labelledby="auth-title">
				<h2 id="auth-title">Login</h2>
				<p class="hint">
					Demo account: <strong>admin</strong> / <strong>password123</strong>
				</p>
				<form id="login-form" novalidate>
					<div class="field">
						<label for="username">Username</label>
						<input id="username" name="username" type="text" required />
					</div>
					<div class="field">
						<label for="password">Password</label>
						<input id="password" name="password" type="password" required />
					</div>
					<button type="submit" class="btn primary">Login</button>
				</form>
			</section>

			<section id="app-section" class="app-grid hidden" aria-live="polite">
				<article class="card controls-card">
					<div class="section-head">
						<h2 id="form-title">Create Event</h2>
						<button id="logout-btn" class="btn ghost" type="button">Logout</button>
					</div>

					<form id="event-form" novalidate>
						<input id="event-id" type="hidden" />

						<div class="field">
							<label for="title">Title</label>
							<input id="title" name="title" type="text" required maxlength="100" />
						</div>

						<div class="field">
							<label for="description">Description</label>
							<textarea
								id="description"
								name="description"
								required
								maxlength="1000"
								rows="4"
							></textarea>
						</div>

						<div class="field-row">
							<div class="field">
								<label for="date">Date</label>
								<input
									id="date"
									name="date"
									type="text"
									placeholder="Select a date"
									required
								/>
							</div>
							<div class="field">
								<label for="time">Time</label>
								<input
									id="time"
									name="time"
									type="text"
									placeholder="Select time"
									required
								/>
							</div>
						</div>

						<div class="field">
							<label for="location">Location</label>
							<input id="location" name="location" type="text" required maxlength="120" />
						</div>

						<div class="actions">
							<button id="submit-btn" type="submit" class="btn primary">Add Event</button>
							<button id="cancel-edit-btn" type="button" class="btn secondary hidden">
								Cancel Edit
							</button>
						</div>
					</form>
				</article>

				<article class="card list-card">
					<div class="section-head">
						<h2>Events</h2>
						<span id="event-count" class="badge">0 events</span>
					</div>
					<div id="status-message" class="status" role="status" aria-live="assertive"></div>
					<div id="event-list" class="event-list"></div>
				</article>
			</section>
		</main>
	</body>
</html>
